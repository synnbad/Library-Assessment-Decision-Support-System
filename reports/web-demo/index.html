<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Feedback Sentiment Analysis</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Library Feedback Analyser</h1>
            <p class="subtitle">Classify student feedback as Positive, Neutral, or Negative</p>
        </header>

        <main>
            <div class="input-section">
                <label for="message-input">Enter student feedback:</label>
                <textarea 
                    id="message-input" 
                    placeholder="Paste or type student feedback here..."
                    rows="5"
                ></textarea>
                <button id="classify-btn" onclick="classifyMessage()">Analyse Sentiment</button>
            </div>

            <div class="result-section" id="result-section" style="display: none;">
                <h2>Sentiment Result</h2>
                <div class="result-card">
                    <div class="result-item">
                        <span class="label">Sentiment:</span>
                        <span id="result-label" class="value label-badge"></span>
                    </div>
                    
                    <div class="result-item">
                        <span class="label">Confidence:</span>
                        <span id="result-confidence" class="value"></span>
                        <div class="confidence-bar">
                            <div id="confidence-fill" class="confidence-fill"></div>
                        </div>
                    </div>
                    
                    <div class="result-item">
                        <span class="label">Reason:</span>
                        <span id="result-reason" class="value reason-text"></span>
                    </div>
                    
                    <div class="result-item" id="escalate-section" style="display: none;">
                        <span class="label">⚠️ Status:</span>
                        <span class="value escalate-badge">Needs Human Review</span>
                    </div>
                </div>
            </div>

            <div class="examples-section">
                <h3>Try these examples:</h3>
                <div class="examples-grid">
                    <button class="example-btn" onclick="loadExample('The library staff were incredibly helpful when I needed research assistance.')">
                        Positive Example
                    </button>
                    <button class="example-btn" onclick="loadExample('The library is generally okay, though more power outlets would be useful.')">
                        Neutral Example
                    </button>
                    <button class="example-btn" onclick="loadExample('The computers are always broken and the Wi-Fi keeps disconnecting.')">
                        Negative Example
                    </button>
                </div>
            </div>
        </main>

        <footer>
            <p>Library Assessment Project — Sentiment Analysis v1.0</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
